<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>World Tech | Divine Machinery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="machine-background">
        <!-- Текстура шума поверх изображения -->
        <div class="noise-layer"></div>
        
        <div class="interface-container">
            <header>
                <div class="glitch-title">DIVINE MACHINERY TERMINAL</div>
            </header>

            <div id="output-display" class="scrolling-content">
                <p>Приветсвую. Этот сайт создан для того чтобы было проще читать информацию о мирах. В нашем случае - Мир Тэч.</p>
                <p>You need to write a number for the info you'd like to read.</p>
            </div>

            <div class="control-panel">
                <button onclick="fetchInfo(1)">1 - Информация о Мире</button>
                <button onclick="fetchInfo(2)">2 - Религия</button>
                <button onclick="fetchInfo(3)">3 - Политическое состояние</button>
                <button onclick="fetchInfo(4)">4 - Факты</button>
                <button onclick="exitRitual()" class="exit-btn">5 - Закончить сессию</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
